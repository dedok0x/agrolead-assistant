services:
  db:
    image: postgres:16-alpine
    container_name: agrolead-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agrolead}
      POSTGRES_USER: ${POSTGRES_USER:-agrolead}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agrolead123}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-agrolead} -d ${POSTGRES_DB:-agrolead}",
        ]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: ./backend
    container_name: agrolead-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      TZ: ${TZ:-Europe/Moscow}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://agrolead:agrolead123@db:5432/agrolead}
      MODEL_NAME: ${MODEL_NAME:-qwen2.5:0.5b}
      OLLAMA_BASE: ${OLLAMA_BASE:-http://ollama:11434}
      MODEL_NUM_CTX: ${MODEL_NUM_CTX:-8192}
      MODEL_NUM_PREDICT: ${MODEL_NUM_PREDICT:-180}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-315920}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-agrolead-admin-token}
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - app_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  webui:
    image: nginx:alpine
    container_name: agrolead-webui
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./web/index.html:/usr/share/nginx/html/index.html:ro
      - ./web/admin.html:/usr/share/nginx/html/admin.html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

  picoclaw:
    image: ${PICOCLAW_IMAGE:-ghcr.io/sipeed/picoclaw:latest}
    container_name: picoclaw
    restart: unless-stopped
    profiles: ["picoclaw"]
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE:-http://ollama:11434}
      PICOCLAW_LOG_LEVEL: ${PICOCLAW_LOG_LEVEL:-info}
    depends_on:
      ollama:
        condition: service_started
    ports:
      - "8787:8787"
    volumes:
      - ./config/picoclaw-config.json:/app/config.json:ro

volumes:
  app_data:
  pg_data:
  ollama_data:
