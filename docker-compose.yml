services:
  picoclaw:
    image: ${PICOCLAW_IMAGE}
    container_name: ${CONTAINER_NAME:-picoclaw}
    restart: unless-stopped
    command: ["--allow-empty"]
    network_mode: host
    environment:
      TZ: ${TZ:-Europe/Moscow}
      API_KEY: ${API_KEY:-}
      DB_URL: ${DB_URL:-sqlite:///data/picoclaw.db}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-ollama}
      MODEL_NAME: ${MODEL_NAME:-qwen2.5:7b}
      API_BASE: ${API_BASE:-http://127.0.0.1:11434/v1}
    volumes:
      - picoclaw_data:/data
      - ./config/picoclaw-config.json:/root/.picoclaw/config.json:ro
      - picoclaw_workspace:/root/.picoclaw/workspace
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18790/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    network_mode: host
    volumes:
      - ollama_data:/root/.ollama

volumes:
  picoclaw_data:
  picoclaw_workspace:
  ollama_data:
