services:
  db:
    image: postgres:16-alpine
    container_name: agrolead-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agrolead}
      POSTGRES_USER: ${POSTGRES_USER:-agrolead}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agrolead123}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-agrolead} -d ${POSTGRES_DB:-agrolead}",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
    mem_limit: 768m
    cpus: 0.35
    networks:
      - agrolead

  api:
    build:
      context: ./backend
    container_name: agrolead-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      TZ: ${TZ:-Europe/Moscow}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://agrolead:agrolead123@db:5432/agrolead}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-315920}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-agrolead-admin-token}
      SALES_STYLE: ${SALES_STYLE:-kuban-direct}
      TOXIC_STRICT_MODE: ${TOXIC_STRICT_MODE:-1}

      LLM_PROVIDER: ${LLM_PROVIDER:-gigachat}
      LLM_REQUEST_TIMEOUT_SECONDS: ${LLM_REQUEST_TIMEOUT_SECONDS:-5}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      LLM_REWRITE_ENABLED: ${LLM_REWRITE_ENABLED:-1}

      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY:-}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_AUTH_URL: ${GIGACHAT_AUTH_URL:-https://gigachat.devices.sberbank.ru/api/v2/oauth}
      GIGACHAT_API_BASE_URL: ${GIGACHAT_API_BASE_URL:-https://gigachat.devices.sberbank.ru/api/v1}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-2}
      GIGACHAT_VERIFY_SSL: ${GIGACHAT_VERIFY_SSL:-1}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
    mem_limit: 768m
    cpus: 0.55
    networks:
      - agrolead

  webui:
    build:
      context: ./web
    image: agrolead/webui:local
    container_name: agrolead-webui
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 128m
    cpus: 0.10
    networks:
      - agrolead

volumes:
  app_data:
  pg_data:

networks:
  agrolead:
    driver: bridge
