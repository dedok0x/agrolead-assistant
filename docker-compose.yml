services:
  picoclaw:
    image: ${PICOCLAW_IMAGE}
    container_name: ${CONTAINER_NAME:-picoclaw}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      TZ: ${TZ:-Europe/Moscow}
      API_KEY: ${API_KEY:-}
      DB_URL: ${DB_URL:-}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-}
      MODEL_NAME: ${MODEL_NAME:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

