services:
  picoclaw:
    image: ${PICOCLAW_IMAGE}
    container_name: ${CONTAINER_NAME:-picoclaw}
    restart: unless-stopped
    command: ["--allow-empty"]
    ports:
      - "${APP_PORT:-18790}:18790"
    environment:
      TZ: ${TZ:-Europe/Moscow}
      API_KEY: ${API_KEY:-}
      DB_URL: ${DB_URL:-sqlite:///data/picoclaw.db}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-ollama}
      MODEL_NAME: ${MODEL_NAME:-qwen2.5:7b}
      API_BASE: ${API_BASE:-http://ollama:11434/v1}
    volumes:
      - picoclaw_data:/data
      - picoclaw_home:/root/.picoclaw
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18790/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  picoclaw_data:
  picoclaw_home:
  ollama_data:
