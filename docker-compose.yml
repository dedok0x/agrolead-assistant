services:
  api:
    build:
      context: ./backend
    container_name: agrolead-api
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-Europe/Moscow}
      MODEL_NAME: ${MODEL_NAME:-qwen2.5:0.5b}
      OLLAMA_BASE: ${OLLAMA_BASE:-http://127.0.0.1:11434}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-315920}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-agrolead-admin-token}
    volumes:
      - app_data:/data
    depends_on:
      - ollama
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    network_mode: host
    volumes:
      - ollama_data:/root/.ollama

  webui:
    image: nginx:alpine
    container_name: agrolead-webui
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./web/index.html:/usr/share/nginx/html/index.html:ro
      - ./web/admin.html:/usr/share/nginx/html/admin.html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

volumes:
  app_data:
  ollama_data:
