<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Петрохлеб-Кубань — ассистент заявок</title>
  <style>
    :root { --bg:#f5f7f3; --card:#fff; --ink:#1f2a22; --line:#d7dfd2; --brand:#2f5c30; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI", Tahoma, sans-serif; background:var(--bg); color:var(--ink); }
    .wrap { max-width:1280px; margin:0 auto; padding:14px; }
    .top { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px; }
    .title { font-size:22px; font-weight:700; }
    .sub { color:#5f6b62; font-size:13px; margin-top:4px; }
    .layout { display:grid; grid-template-columns:320px 1fr; gap:10px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; }
    .chips { display:flex; gap:6px; flex-wrap:wrap; }
    .chip { border:1px solid #c4d0be; background:#eef4ea; border-radius:999px; padding:6px 10px; cursor:pointer; font-size:12px; }
    .stream { border:1px solid #e2e8de; border-radius:10px; min-height:56vh; max-height:56vh; overflow:auto; padding:10px; background:#fcfdfb; }
    .msg { max-width:86%; padding:9px 11px; border-radius:9px; margin-bottom:8px; white-space:pre-wrap; font-size:14px; line-height:1.45; }
    .msg.in { margin-left:auto; background:#eaf1e5; border:1px solid #d1ddc9; }
    .msg.out { margin-right:auto; background:#fff; border:1px solid #dee5da; }
    .composer { display:grid; grid-template-columns:1fr auto auto; gap:8px; margin-top:8px; }
    textarea { width:100%; min-height:82px; border:1px solid #cfd8c9; border-radius:8px; padding:8px; font:inherit; }
    button { border:1px solid var(--brand); background:var(--brand); color:#fff; border-radius:8px; padding:0 12px; cursor:pointer; }
    button.ghost { background:#fff; color:var(--brand); }
    .status { color:#5f6b62; font-size:12px; margin-bottom:8px; }
    @media (max-width: 980px) { .layout { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">Петрохлеб-Кубань</div>
      <div class="sub">B2B ассистент: закупка, продажа, логистика, хранение, экспорт</div>
    </div>

    <div class="layout">
      <aside class="card">
        <h3 style="margin-top:0">О компании</h3>
        <div id="company" style="font-size:13px;color:#49564d"></div>
        <h4>Быстрые темы</h4>
        <div class="chips" id="request-types"></div>
        <h4>Культуры</h4>
        <div class="chips" id="commodities"></div>
      </aside>

      <section class="card">
        <div class="status" id="status">Готов к диалогу</div>
        <div class="stream" id="stream"></div>
        <div class="composer">
          <textarea id="text" placeholder="Опишите задачу: что продаете/покупаете, объем, регион, логистику, сроки и контакт"></textarea>
          <button id="send">Отправить</button>
          <button id="clear" class="ghost">Очистить</button>
        </div>
      </section>
    </div>
  </div>

  <script>
    let sessionId = null
    const stream = document.getElementById("stream")
    const statusEl = document.getElementById("status")

    function add(text, direction) {
      const el = document.createElement("div")
      el.className = `msg ${direction}`
      el.textContent = text
      stream.appendChild(el)
      stream.scrollTop = stream.scrollHeight
    }

    function setStatus(text, bad = false) {
      statusEl.textContent = text
      statusEl.style.color = bad ? "#b01919" : "#5f6b62"
    }

    async function bootstrap() {
      try {
        const res = await fetch("/api/public/bootstrap")
        const data = await res.json()
        document.getElementById("company").textContent = `${data.company?.name || ""}. ${data.company?.services || ""}`

        const reqWrap = document.getElementById("request-types")
        ;(data.request_types || []).forEach(item => {
          const b = document.createElement("button")
          b.className = "chip"
          b.textContent = item.name
          b.onclick = () => {
            document.getElementById("text").value = `Нужна консультация: ${item.name}`
            document.getElementById("text").focus()
          }
          reqWrap.appendChild(b)
        })

        const comWrap = document.getElementById("commodities")
        ;(data.commodities || []).forEach(item => {
          const b = document.createElement("button")
          b.className = "chip"
          b.textContent = item.name
          b.onclick = () => {
            document.getElementById("text").value = `Интересует ${item.name}, объем 200 тонн, регион Краснодар.`
            document.getElementById("text").focus()
          }
          comWrap.appendChild(b)
        })
      } catch {
        document.getElementById("company").textContent = "Справка временно недоступна."
      }
    }

    async function send() {
      const textEl = document.getElementById("text")
      const text = textEl.value.trim()
      if (!text) return
      add(text, "in")
      textEl.value = ""
      setStatus("Обработка сообщения...")

      try {
        const res = await fetch("/api/v1/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, session_id: sessionId, client_id: "web-user", source_channel: "web_widget" }),
        })
        const payload = await res.json()
        if (!res.ok) throw new Error(payload.detail || `HTTP ${res.status}`)
        sessionId = payload.session_id || sessionId
        add(payload.text || "Ответ пуст", "out")
        setStatus(`Готово · ${payload.provider || "engine"} · ${payload.status || "draft"}`)
      } catch (e) {
        add(`Ошибка: ${e.message || e}`, "out")
        setStatus("Сбой запроса", true)
      }
    }

    document.getElementById("send").onclick = send
    document.getElementById("clear").onclick = () => {
      sessionId = null
      stream.innerHTML = ""
      setStatus("Диалог очищен")
    }
    document.getElementById("text").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault()
        send()
      }
    })

    ;(async () => {
      await bootstrap()
      add("Добрый день. Зафиксирую заявку по зерну и логистике, чтобы менеджер быстро вышел с условиями.", "out")
    })()
  </script>
</body>
</html>
