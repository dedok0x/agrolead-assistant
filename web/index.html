<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Петрохлеб-Кубань — AI ассистент</title>
		<style>
			:root {
				--bg: #ffffff;
				--bg-soft: #f7f8f5;
				--ink: #1f2622;
				--muted: #6b736e;
				--line: #dfe4dc;
				--brand: #5d7528;
				--brand-dark: #2a4200;
				--radius: 14px;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
				color: var(--ink);
				background: var(--bg);
			}

			.page {
				min-height: 100vh;
				display: flex;
				flex-direction: column;
			}

			.header {
				border-bottom: 1px solid var(--line);
				background: var(--bg);
			}

			.header__inner {
				max-width: 1240px;
				margin: 0 auto;
				padding: 18px 20px;
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 16px;
			}

			.logo {
				font-size: 22px;
				font-weight: 700;
				letter-spacing: -0.02em;
				text-transform: uppercase;
			}

			.sublogo {
				font-size: 12px;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.08em;
			}

			.main {
				max-width: 1240px;
				margin: 0 auto;
				padding: 26px 20px 30px;
				display: grid;
				grid-template-columns: 320px minmax(0, 1fr);
				gap: 18px;
				width: 100%;
				flex: 1;
			}

			.card {
				border: 1px solid var(--line);
				border-radius: var(--radius);
				background: var(--bg);
			}

			.side {
				padding: 18px;
				background: var(--bg-soft);
			}

			.side h3 {
				margin: 0 0 12px;
				font-size: 15px;
				text-transform: uppercase;
				letter-spacing: 0.08em;
			}

			.muted {
				color: var(--muted);
				font-size: 13px;
				line-height: 1.5;
			}

			.chips {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				margin-top: 14px;
			}

			.chip {
				appearance: none;
				border: 1px solid #cad3c4;
				background: #fff;
				color: #364036;
				border-radius: 999px;
				padding: 8px 12px;
				font-size: 12px;
				cursor: pointer;
				transition: 0.2s ease;
			}

			.chip:hover {
				border-color: var(--brand);
				color: var(--brand-dark);
			}

			.chat {
				display: flex;
				flex-direction: column;
				min-height: 74vh;
			}

			.chat__head {
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: 14px 16px;
				border-bottom: 1px solid var(--line);
			}

			.chat__title {
				font-size: 14px;
				font-weight: 700;
				letter-spacing: 0.08em;
				text-transform: uppercase;
			}

			.stream {
				display: flex;
				flex-direction: column;
				gap: 10px;
				padding: 16px;
				height: 58vh;
				overflow: auto;
			}

			.msg {
				max-width: 82%;
				padding: 11px 12px;
				border-radius: 10px;
				line-height: 1.45;
				white-space: pre-wrap;
				font-size: 14px;
			}

			.msg.u {
				align-self: flex-end;
				background: #ecf1e6;
				border: 1px solid #d3dcc8;
			}

			.msg.b {
				align-self: flex-start;
				background: #fff;
				border: 1px solid #e2e6df;
			}

			.composer {
				display: grid;
				grid-template-columns: 1fr auto auto;
				gap: 10px;
				padding: 14px;
				border-top: 1px solid var(--line);
			}

			textarea {
				width: 100%;
				min-height: 80px;
				resize: vertical;
				border: 1px solid #cfd7cb;
				border-radius: 10px;
				padding: 10px 12px;
				font: inherit;
			}

			button {
				appearance: none;
				border: 1px solid var(--brand);
				background: var(--brand);
				color: #fff;
				border-radius: 10px;
				padding: 0 14px;
				font-weight: 700;
				cursor: pointer;
			}

			button:hover {
				background: var(--brand-dark);
				border-color: var(--brand-dark);
			}

			button.ghost {
				background: #fff;
				color: #364036;
				border-color: #c9d2c4;
			}

			button.ghost:hover {
				background: #f2f5ef;
			}

			@media (max-width: 980px) {
				.main {
					grid-template-columns: 1fr;
				}

				.chat {
					min-height: 68vh;
				}

				.stream {
					height: 50vh;
				}
			}
		</style>
	</head>
	<body>
		<div class="page">
			<header class="header">
				<div class="header__inner">
					<div>
						<div class="logo">Петрохлеб-Кубань</div>
						<div class="sublogo">AI ассистент по зерновым сделкам</div>
					</div>
				</div>
			</header>

			<main class="main">
				<aside class="card side">
					<h3>О компании</h3>
					<div class="muted" id="company"></div>
					<div class="chips" id="chips"></div>
				</aside>

				<section class="card chat">
					<div class="chat__head">
						<div class="chat__title">Чат с ассистентом</div>
						<div id="status" class="muted">Готово</div>
					</div>
					<div class="stream" id="chat"></div>
					<div class="composer">
						<textarea
							id="input"
							placeholder="Введите запрос: цена, наличие, логистика, условия поставки"
						></textarea>
						<button id="send">Отправить</button>
						<button id="clear" class="ghost">Очистить</button>
					</div>
				</section>
			</main>
		</div>

		<script>
			const chatEl = document.getElementById('chat')
			const inputEl = document.getElementById('input')
			const statusEl = document.getElementById('status')
			const chipsEl = document.getElementById('chips')
			let sessionId = null

			function addMsg(text, role) {
				const el = document.createElement('div')
				el.className = `msg ${role}`
				el.textContent = text
				chatEl.appendChild(el)
				chatEl.scrollTop = chatEl.scrollHeight
				return el
			}

			function setStatus(text, error = false) {
				statusEl.textContent = text
				statusEl.style.color = error ? '#b00020' : '#6b736e'
			}

			async function bootstrap() {
				try {
					const res = await fetch('/api/public/bootstrap')
					if (!res.ok) throw new Error(`HTTP ${res.status}`)
					const data = await res.json()

					document.getElementById('company').textContent = `${
						data.company?.name || ''
					}. ${data.company?.services || ''}`
					;(data.scenarios || []).forEach(s => {
						const b = document.createElement('button')
						b.className = 'chip'
						b.textContent = s.title
						b.onclick = () => {
							inputEl.value = s.title
							inputEl.focus()
						}
						chipsEl.appendChild(b)
					})
					;(data.products || []).slice(0, 6).forEach(p => {
						const b = document.createElement('button')
						b.className = 'chip'
						b.textContent = `${p.culture} ${p.grade}`.trim()
						b.onclick = () => {
							inputEl.value = `Интересует ${p.name}. Объем 100 тонн, доставка в Краснодар.`
							inputEl.focus()
						}
						chipsEl.appendChild(b)
					})
				} catch {
					document.getElementById('company').textContent =
						'Данные о компании временно недоступны. Вы можете задать вопрос в чат.'
				}
			}

			async function send() {
				const text = inputEl.value.trim()
				if (!text) return

				addMsg(text, 'u')
				inputEl.value = ''
				setStatus('Генерирую ответ...')

				let bot = null

				try {
					const res = await fetch('/api/chat/stream', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({
							text,
							session_id: sessionId,
							client_id: 'web-client',
						}),
					})

					if (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`)

					const reader = res.body.getReader()
					const decoder = new TextDecoder()
					let buffer = ''
					let full = ''

					while (true) {
						const { value, done } = await reader.read()
						if (done) break

						buffer += decoder.decode(value, { stream: true })
						const lines = buffer.split('\n')
						buffer = lines.pop() || ''

						for (const line of lines) {
							if (!line.trim()) continue
							let j = null
							try {
								j = JSON.parse(line)
							} catch {
								continue
							}
							if (j.session_id) sessionId = j.session_id
							if (j.token) {
								if (!bot) bot = addMsg('', 'b')
								full += j.token
								bot.textContent = full
								chatEl.scrollTop = chatEl.scrollHeight
							}
							if (j.done && bot)
								bot.textContent = (bot.textContent || '').trim()
						}
					}

					setStatus('Готово')
				} catch (e) {
					if (!bot) bot = addMsg('', 'b')
					bot.textContent =
						'Ошибка запроса. Проверьте соединение с сервером и попробуйте ещё раз.'
					setStatus('Сетевой сбой или недоступен API', true)
				}
			}

			document.getElementById('send').onclick = send
			document.getElementById('clear').onclick = () => {
				sessionId = null
				chatEl.innerHTML = ''
				addMsg(
					'Чат очищен. Уточните запрос по закупке, продаже, логистике или хранению.',
					'b',
				)
				setStatus('Готово')
			}

			inputEl.addEventListener('keydown', e => {
				if (e.key === 'Enter' && !e.shiftKey) {
					e.preventDefault()
					send()
				}
			})
			;(async () => {
				await bootstrap()
				addMsg(
					'Здравствуйте! Я помогу по ценам, наличию, поставке и хранению зерновых культур.',
					'b',
				)
			})()
		</script>
	</body>
</html>
