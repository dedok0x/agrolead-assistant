<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Петрохлеб-Кубань — поддержка клиентов</title>
		<style>
			body {
				margin: 0;
				font-family: Inter, Arial, sans-serif;
				background: #f5f7ef;
				color: #24301f;
			}
			.top {
				background: linear-gradient(135deg, #7fa33e, #4f6f2b);
				color: #fff;
				padding: 18px;
			}
			.wrap {
				max-width: 1100px;
				margin: 14px auto;
				padding: 0 14px;
				display: grid;
				grid-template-columns: 300px 1fr;
				gap: 12px;
			}
			.card {
				background: #fff;
				border: 1px solid #d6dfc5;
				border-radius: 12px;
			}
			.side {
				padding: 12px;
			}
			.chips {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				margin-top: 10px;
			}
			.chip {
				border: 1px solid #c8d9aa;
				background: #eef5df;
				border-radius: 999px;
				padding: 6px 10px;
				cursor: pointer;
				font-size: 12px;
			}
			.chat {
				display: flex;
				flex-direction: column;
				min-height: 76vh;
			}
			.head {
				display: flex;
				justify-content: space-between;
				padding: 12px;
				border-bottom: 1px solid #e3e9d8;
			}
			.stream {
				padding: 12px;
				height: 58vh;
				overflow: auto;
				display: flex;
				flex-direction: column;
				gap: 10px;
			}
			.msg {
				max-width: 80%;
				padding: 10px 12px;
				border-radius: 12px;
				white-space: pre-wrap;
				line-height: 1.4;
			}
			.u {
				align-self: flex-end;
				background: #e7efdb;
				border: 1px solid #ccd8bc;
			}
			.b {
				align-self: flex-start;
				background: #f0f7e6;
				border: 1px solid #d2e3b7;
			}
			.composer {
				display: grid;
				grid-template-columns: 1fr auto auto;
				gap: 10px;
				padding: 12px;
				border-top: 1px solid #e3e9d8;
			}
			textarea {
				width: 100%;
				min-height: 78px;
				border: 1px solid #cedbb7;
				border-radius: 10px;
				padding: 10px;
				resize: vertical;
			}
			button {
				border: 1px solid #4f6f2b;
				background: #4f6f2b;
				color: #fff;
				border-radius: 10px;
				padding: 0 14px;
				cursor: pointer;
				font-weight: 700;
			}
			.ghost {
				background: #fff;
				color: #3e5623;
				border-color: #b7c9a0;
			}
			.muted {
				color: #6a755d;
				font-size: 13px;
				line-height: 1.4;
			}
			@media (max-width: 900px) {
				.wrap {
					grid-template-columns: 1fr;
				}
				.stream {
					height: 50vh;
				}
			}
		</style>
	</head>
	<body>
		<header class="top">
			<h2 style="margin: 0">ООО «Петрохлеб-Кубань»</h2>
			<div style="opacity: 0.9">Лид-центр предпродажной поддержки</div>
		</header>
		<main class="wrap">
			<aside class="card side">
				<h3 style="margin: 0 0 8px">Сценарии</h3>
				<div class="muted" id="company"></div>
				<div class="chips" id="chips"></div>
			</aside>

			<section class="card chat">
				<div class="head">
					<b>Чат поддержки</b><span id="status" class="muted">Онлайн</span>
				</div>
				<div class="stream" id="chat"></div>
				<div class="composer">
					<textarea
						id="input"
						placeholder="Укажите товар, класс, объем, регион и желаемый срок"
					></textarea>
					<button id="send">Отправить</button>
					<button id="clear" class="ghost">Очистить</button>
				</div>
			</section>
		</main>

		<script>
			const STORE = 'agrolead_current_chat_v2'
			const STORE_SID = 'agrolead_current_session_id'
			const chatEl = document.getElementById('chat')
			const inputEl = document.getElementById('input')
			const statusEl = document.getElementById('status')
			const chipsEl = document.getElementById('chips')
			let sessionId = Number(localStorage.getItem(STORE_SID) || 0) || null
			let history = JSON.parse(localStorage.getItem(STORE) || '[]')

			function addMsg(text, role, persist = true) {
				const el = document.createElement('div')
				el.className = `msg ${role}`
				el.textContent = text
				chatEl.appendChild(el)
				chatEl.scrollTop = chatEl.scrollHeight
				if (persist) {
					history.push({ role, text })
					localStorage.setItem(STORE, JSON.stringify(history))
				}
				return el
			}

			function setStatus(t, e = false) {
				statusEl.textContent = t
				statusEl.style.color = e ? '#b00020' : '#6a755d'
			}

			async function bootstrap() {
				const res = await fetch('/api/public/bootstrap')
				const data = await res.json()
				document.getElementById('company').textContent =
					`${data.company?.name || ''}. ${data.company?.services || ''}`
				;(data.scenarios || []).forEach(s => {
					const b = document.createElement('button')
					b.className = 'chip'
					b.textContent = s.title
					b.onclick = () => {
						inputEl.value = s.title
						inputEl.focus()
					}
					chipsEl.appendChild(b)
				})
			}

			async function send() {
				const text = inputEl.value.trim()
				if (!text) return
				addMsg(text, 'u')
				inputEl.value = ''
				setStatus('Ассистент печатает...')
				const bot = addMsg('', 'b', false)

				try {
					const res = await fetch('/api/chat/stream', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({
							text,
							session_id: sessionId,
							client_id: 'web-client',
						}),
					})
					if (!res.ok || !res.body) {
						throw new Error(`HTTP ${res.status}`)
					}
					const reader = res.body.getReader()
					const decoder = new TextDecoder()
					let buffer = ''
					let full = ''
					while (true) {
						const { value, done } = await reader.read()
						if (done) break
						buffer += decoder.decode(value, { stream: true })
						const lines = buffer.split('\n')
						buffer = lines.pop() || ''
						for (const line of lines) {
							if (!line.trim()) continue
							const j = JSON.parse(line)
							if (j.session_id) {
								sessionId = j.session_id
								localStorage.setItem(STORE_SID, String(sessionId))
							}
							if (j.token) {
								full += j.token
								bot.textContent = full
								chatEl.scrollTop = chatEl.scrollHeight
							}
							if (j.done) {
								bot.textContent = (bot.textContent || '').trim()
								history.push({ role: 'b', text: bot.textContent })
								localStorage.setItem(STORE, JSON.stringify(history))
							}
						}
					}
					setStatus('Онлайн')
				} catch (e) {
					bot.textContent = 'Ошибка обработки запроса. Повторите попытку.'
					setStatus(String(e), true)
				}
			}

			document.getElementById('send').onclick = send
			document.getElementById('clear').onclick = () => {
				history = []
				sessionId = null
				localStorage.removeItem(STORE)
				localStorage.removeItem(STORE_SID)
				chatEl.innerHTML = ''
				addMsg('Чат очищен. Уточните, пожалуйста, товар и объем.', 'b')
				setStatus('Онлайн')
			}
			inputEl.addEventListener('keydown', e => {
				if (e.key === 'Enter' && !e.shiftKey) {
					e.preventDefault()
					send()
				}
			})
			;(async () => {
				await bootstrap()
				if (history.length) {
					history.forEach(m => addMsg(m.text, m.role, false))
					setStatus('История восстановлена')
				} else
					addMsg(
						'Здравствуйте! Подскажу по наличию, цене, логистике и оформлению заявки.',
						'b',
					)
			})()
		</script>
	</body>
</html>
