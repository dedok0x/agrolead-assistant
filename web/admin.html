<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Бэк-офис — Петрохлеб-Кубань</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: #eef2ec; color: #1f2a22; }
    .wrap { max-width: 1440px; margin: 16px auto; padding: 0 12px; }
    .card { background: #fff; border: 1px solid #d8dfd2; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 6px; }
    .tab { border: 1px solid #a8b99f; background: #f3f7ef; border-radius: 8px; padding: 7px 10px; cursor: pointer; }
    .tab.active { background: #2f5c30; color: #fff; border-color: #2f5c30; }
    .hidden { display: none; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    input, textarea, select, button { font: inherit; }
    input, textarea, select { width: 100%; border: 1px solid #cfd8c9; border-radius: 8px; padding: 7px; }
    textarea { min-height: 120px; }
    button { border: 1px solid #2f5c30; background: #2f5c30; color: #fff; border-radius: 8px; padding: 7px 10px; cursor: pointer; }
    button.ghost { background: #fff; color: #2f5c30; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #e1e7dc; padding: 6px; font-size: 13px; vertical-align: top; text-align: left; }
    th { background: #f4f8f1; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .mono { font-family: Consolas, monospace; white-space: pre-wrap; background: #f6f8f5; border: 1px solid #dfe6db; border-radius: 8px; padding: 8px; max-height: 340px; overflow: auto; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; border: 1px solid #c4d3bc; background: #edf3e8; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="login-card">
      <h2>Вход в бэк-офис</h2>
      <div class="grid">
        <input id="login" value="admin" placeholder="Логин" />
        <input id="password" type="password" placeholder="Пароль" />
      </div>
      <div class="row"><button id="login-btn">Войти</button></div>
    </div>

    <div id="panel" class="hidden">
      <div class="card">
        <h2 style="margin:0 0 8px">Операционный бэк-офис Петрохлеб-Кубань</h2>
        <div class="tabs" id="tabs"></div>
      </div>

      <section id="tab-dashboard" class="card tab-pane"></section>
      <section id="tab-leads" class="card tab-pane hidden"></section>
      <section id="tab-pipeline" class="card tab-pane hidden"></section>
      <section id="tab-counterparties" class="card tab-pane hidden"></section>
      <section id="tab-nomenclature" class="card tab-pane hidden"></section>
      <section id="tab-quality" class="card tab-pane hidden"></section>
      <section id="tab-price-policies" class="card tab-pane hidden"></section>
      <section id="tab-lots" class="card tab-pane hidden"></section>
      <section id="tab-regions" class="card tab-pane hidden"></section>
      <section id="tab-transport" class="card tab-pane hidden"></section>
      <section id="tab-delivery-basis" class="card tab-pane hidden"></section>
      <section id="tab-knowledge" class="card tab-pane hidden"></section>
      <section id="tab-chat-sessions" class="card tab-pane hidden"></section>
      <section id="tab-tasks" class="card tab-pane hidden"></section>
      <section id="tab-users" class="card tab-pane hidden"></section>
      <section id="tab-settings" class="card tab-pane hidden"></section>
    </div>
  </div>

  <script>
    const tabs = [
      ["dashboard", "Сводка"],
      ["leads", "Лиды"],
      ["pipeline", "Воронка"],
      ["counterparties", "Контрагенты"],
      ["nomenclature", "Номенклатура"],
      ["quality", "Шаблоны качества"],
      ["price-policies", "Ценовые политики"],
      ["lots", "Лоты и наличие"],
      ["regions", "Регионы и порты"],
      ["transport", "Виды транспорта"],
      ["delivery-basis", "Базисы поставки"],
      ["knowledge", "База знаний"],
      ["chat-sessions", "Чат-сессии"],
      ["tasks", "Задачи"],
      ["users", "Пользователи и роли"],
      ["settings", "Настройки"],
    ]

    let token = ""
    let currentLeadRows = []
    const statusLabels = {
      draft: "Черновик",
      partially_qualified: "Частично квалифицирован",
      qualified: "Квалифицирован",
      handed_to_manager: "Передан менеджеру",
      closed: "Закрыт",
      blocked: "Заблокирован",
    }

    function activateTab(name) {
      document.querySelectorAll(".tab-pane").forEach(x => x.classList.add("hidden"))
      document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"))
      document.getElementById(`tab-${name}`).classList.remove("hidden")
      document.querySelector(`.tab[data-name='${name}']`)?.classList.add("active")
    }

    function renderTabs() {
      const wrap = document.getElementById("tabs")
      wrap.innerHTML = ""
      tabs.forEach(([code, title]) => {
        const b = document.createElement("button")
        b.className = "tab"
        b.dataset.name = code
        b.textContent = title
        b.onclick = () => activateTab(code)
        wrap.appendChild(b)
      })
      activateTab("dashboard")
    }

    async function api(url, opts = {}) {
      const headers = { "Content-Type": "application/json", ...(opts.headers || {}) }
      if (token) headers["x-admin-token"] = token
      const res = await fetch(url, { ...opts, headers })
      const text = await res.text()
      let data = {}
      try { data = text ? JSON.parse(text) : {} } catch {}
      if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`)
      return data
    }

    function renderDashboard(stats) {
      const el = document.getElementById("tab-dashboard")
      el.innerHTML = `
        <h3>Дашборд</h3>
        <div class="grid4">
          <div><span class="badge">Лиды всего</span><h2>${stats.leads_total || 0}</h2></div>
          <div><span class="badge">Горячие лиды</span><h2>${stats.hot_leads || 0}</h2></div>
          <div><span class="badge">Неназначенные</span><h2>${stats.unassigned_leads || 0}</h2></div>
          <div><span class="badge">Открытые задачи</span><h2>${stats.tasks_open || 0}</h2></div>
        </div>
        <h4>Разбивка по типам запросов</h4>
        <div class="mono">${JSON.stringify(stats.by_request_type || {}, null, 2)}</div>
      `
    }

    function renderLeads(rows) {
      currentLeadRows = rows
      const body = rows.map(row => {
        const contact = row.contact_snapshot || {}
        const item = row.lead_item || {}
        return `
          <tr>
            <td>${row.id}</td>
            <td>${row.request_type_code || ""}</td>
            <td>
              <select data-status='${row.id}'>
                ${["draft","partially_qualified","qualified","handed_to_manager","closed","blocked"].map(s => `<option value='${s}' ${row.status_code===s?"selected":""}>${statusLabels[s] || s}</option>`).join("")}
              </select>
            </td>
            <td>${row.priority_code || ""}</td>
            <td>${contact.company_name || contact.contact_name || ""}<br>${contact.phone || contact.email || contact.telegram || ""}</td>
            <td>Товар ID: ${item.commodity_id || ""}<br>Объем: ${item.volume_value || ""} ${item.volume_unit || ""}</td>
            <td>${row.summary || ""}</td>
            <td><textarea data-comment='${row.id}' style='min-height:64px'>${row.manager_comment || ""}</textarea><div class='row'><button data-save='${row.id}'>Сохранить</button></div></td>
          </tr>
        `
      }).join("")
      document.getElementById("tab-leads").innerHTML = `
        <h3>Лиды</h3>
        <div class="row"><button id="reload-leads" class="ghost">Обновить</button></div>
        <div style="overflow:auto;margin-top:8px">
          <table>
            <thead><tr><th>ID</th><th>Тип</th><th>Статус</th><th>Приоритет</th><th>Контакт</th><th>Предмет</th><th>Сводка</th><th>Комментарий</th></tr></thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `

      document.getElementById("reload-leads").onclick = loadAll
      document.querySelectorAll("button[data-save]").forEach(btn => {
        btn.onclick = async () => {
          const id = Number(btn.dataset.save)
          const status = document.querySelector(`select[data-status='${id}']`).value
          const manager_comment = document.querySelector(`textarea[data-comment='${id}']`).value
          await api(`/api/v1/leads/${id}`, { method: "PUT", body: JSON.stringify({ status_code: status, manager_comment }) })
          await loadAll()
        }
      })
    }

    function renderPipeline(data) {
      const rows = (data.items || []).map(x => `<tr><td>${x.code}</td><td>${x.name}</td><td>${x.count}</td></tr>`).join("")
      document.getElementById("tab-pipeline").innerHTML = `
        <h3>Воронка лидов</h3>
        <table><thead><tr><th>Код</th><th>Этап</th><th>Кол-во</th></tr></thead><tbody>${rows}</tbody></table>
      `
    }

    function renderJsonSection(tabId, title, endpoint, data) {
      const id = `${tabId}-json`
      document.getElementById(`tab-${tabId}`).innerHTML = `
        <h3>${title}</h3>
        <textarea id='${id}'>${JSON.stringify(data, null, 2)}</textarea>
        <div class='row'><button id='save-${tabId}'>Сохранить</button><button id='reload-${tabId}' class='ghost'>Перечитать</button></div>
      `
      document.getElementById(`save-${tabId}`).onclick = async () => {
        const payload = JSON.parse(document.getElementById(id).value)
        if (Array.isArray(payload)) {
          for (const row of payload) {
            if (row.id) {
              await api(`${endpoint}/${row.id}`, { method: "PUT", body: JSON.stringify(row) })
            } else {
              await api(endpoint, { method: "POST", body: JSON.stringify(row) })
            }
          }
        }
        await loadAll()
      }
      document.getElementById(`reload-${tabId}`).onclick = loadAll
    }

    function renderChatSessions(rows) {
      const list = rows.map(row => `<tr><td>${row.id}</td><td>${row.current_state_code}</td><td>${row.request_type_id || ""}</td><td>${row.lead_id || ""}</td><td><button data-open='${row.id}'>Открыть</button></td></tr>`).join("")
      document.getElementById("tab-chat-sessions").innerHTML = `
        <h3>Чат-сессии</h3>
        <table><thead><tr><th>ID</th><th>Статус</th><th>Тип запроса</th><th>Лид</th><th>Действие</th></tr></thead><tbody>${list}</tbody></table>
        <h4>Детали</h4>
        <div id='chat-detail' class='mono'>Выберите сессию</div>
      `
      document.querySelectorAll("button[data-open]").forEach(btn => {
        btn.onclick = async () => {
          const detail = await api(`/api/v1/admin/chat-sessions/${btn.dataset.open}`)
          document.getElementById("chat-detail").textContent = JSON.stringify(detail, null, 2)
        }
      })
    }

    async function loadAll() {
      const [stats, leads, pipeline, counterparties, commodities, qualityTemplates, pricePolicies, lots, regions, transportModes, deliveryBasis, knowledge, sessions, tasks, users, settings] = await Promise.all([
        api("/api/v1/admin/stats"),
        api("/api/v1/leads"),
        api("/api/v1/admin/pipeline"),
        api("/api/v1/admin/counterparties"),
        api("/api/v1/catalog/commodities"),
        api("/api/v1/catalog/quality-templates"),
        api("/api/v1/catalog/price-policies"),
        api("/api/v1/catalog/lots"),
        api("/api/v1/catalog/regions"),
        api("/api/v1/catalog/transport-modes"),
        api("/api/v1/catalog/delivery-basis"),
        api("/api/v1/admin/knowledge"),
        api("/api/v1/admin/chat-sessions"),
        api("/api/v1/admin/tasks"),
        api("/api/v1/admin/users"),
        api("/api/v1/admin/settings"),
      ])

      renderDashboard(stats)
      renderLeads(leads)
      renderPipeline(pipeline)
      renderJsonSection("counterparties", "Контрагенты", "/api/v1/admin/counterparties", counterparties)
      renderJsonSection("nomenclature", "Номенклатура", "/api/v1/catalog/commodities", commodities)
      renderJsonSection("quality", "Шаблоны качества", "/api/v1/catalog/quality-templates", qualityTemplates)
      renderJsonSection("price-policies", "Ценовые политики", "/api/v1/catalog/price-policies", pricePolicies)
      renderJsonSection("lots", "Лоты и наличие", "/api/v1/catalog/lots", lots)
      renderJsonSection("regions", "Регионы и порты", "/api/v1/catalog/regions", regions)
      renderJsonSection("transport", "Виды транспорта", "/api/v1/catalog/transport-modes", transportModes)
      renderJsonSection("delivery-basis", "Базисы поставки", "/api/v1/catalog/delivery-basis", deliveryBasis)
      renderJsonSection("knowledge", "База знаний", "/api/v1/admin/knowledge", knowledge)
      renderChatSessions(sessions)
      renderJsonSection("tasks", "Задачи", "/api/v1/admin/tasks", tasks)
      renderJsonSection("users", "Пользователи и роли", "/api/v1/admin/users", users)
      renderJsonSection("settings", "Настройки", "/api/v1/admin/settings", settings)
    }

    document.getElementById("login-btn").onclick = async () => {
      try {
        const payload = await api("/api/v1/admin/login", {
          method: "POST",
          body: JSON.stringify({ username: document.getElementById("login").value, password: document.getElementById("password").value }),
        })
        token = payload.token
        localStorage.setItem("agrolead_admin_token", token)
        document.getElementById("login-card").classList.add("hidden")
        document.getElementById("panel").classList.remove("hidden")
        renderTabs()
        await loadAll()
      } catch (e) {
        alert(`Ошибка входа: ${e.message || e}`)
      }
    }

    ;(async () => {
      const cached = localStorage.getItem("agrolead_admin_token")
      if (!cached) return
      token = cached
      try {
        await api("/api/v1/admin/stats")
        document.getElementById("login-card").classList.add("hidden")
        document.getElementById("panel").classList.remove("hidden")
        renderTabs()
        await loadAll()
      } catch {
        token = ""
        localStorage.removeItem("agrolead_admin_token")
      }
    })()
  </script>
</body>
</html>
