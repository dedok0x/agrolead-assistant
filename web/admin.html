<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Петрохлеб-Кубань — админ панель</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap");

    :root {
      --bg: #0f1720;
      --bg-soft: #141e2a;
      --panel: #182534;
      --panel-2: #1b2b3d;
      --line: #2a3b4b;
      --text: #e4edf6;
      --muted: #9db2c8;
      --brand: #6ea8db;
      --accent: #d6b76b;
      --ok: #78c793;
      --danger: #f18d87;
      --warn: #f0c874;
      --table-head: #223548;
      --input-bg: #11202d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(900px 460px at -10% -10%, #22364a 0%, transparent 70%),
        radial-gradient(900px 460px at 120% 0%, #1d3043 0%, transparent 70%),
        var(--bg);
      font-family: "Manrope", "IBM Plex Sans", sans-serif;
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 14px;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #162433 0%, #12202c 100%);
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .hero h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    .hero p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      max-width: 900px;
    }

    .hero .badge {
      border: 1px solid #4a6077;
      border-radius: 999px;
      padding: 6px 10px;
      color: #c9def2;
      font-size: 12px;
      white-space: nowrap;
      background: #1a2a3a;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      padding: 12px;
      margin-bottom: 10px;
    }

    .hidden { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      overflow: auto;
      scrollbar-width: thin;
      padding-bottom: 2px;
    }

    .tab {
      flex: 0 0 auto;
      border: 1px solid #3d5369;
      border-radius: 999px;
      padding: 7px 11px;
      background: #1c2e40;
      color: #d9e7f5;
      cursor: pointer;
      font-weight: 500;
      white-space: nowrap;
    }

    .tab.active {
      border-color: var(--accent);
      background: linear-gradient(180deg, #2d4e6b 0%, #203a50 100%);
      color: #fff;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }

    input, textarea, select, button {
      font: inherit;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid #3a5065;
      border-radius: 9px;
      background: var(--input-bg);
      color: #e6eff8;
      padding: 7px;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #6390b8;
      box-shadow: 0 0 0 3px rgba(102, 154, 200, 0.2);
    }

    textarea { min-height: 72px; }

    button {
      border: 1px solid #4d7395;
      border-radius: 9px;
      background: linear-gradient(180deg, #31546f 0%, #233d53 100%);
      color: #f1f7fd;
      padding: 7px 12px;
      cursor: pointer;
      font-weight: 600;
    }

    button.ghost {
      background: #1a2c3e;
      border-color: #3f5870;
      color: #d4e3f2;
    }

    button.warn {
      border-color: #7b6838;
      background: linear-gradient(180deg, #5a4d2e 0%, #453a24 100%);
      color: #ffe8b0;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .kpi {
      border: 1px solid #344d64;
      border-radius: 10px;
      background: #1a2c3f;
      padding: 10px;
    }

    .kpi .title {
      color: var(--muted);
      font-size: 12px;
    }

    .kpi .value {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 700;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid #31475b;
      border-radius: 10px;
      margin-top: 8px;
      background: #142331;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
    }

    th, td {
      border: 1px solid #2b3f52;
      padding: 7px;
      font-size: 13px;
      vertical-align: top;
      text-align: left;
    }

    th {
      background: var(--table-head);
      color: #d8e8f8;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-block;
      border: 1px solid #4a6179;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      color: #c9def3;
      background: #1d3042;
    }

    .msg {
      margin-top: 8px;
      font-size: 12px;
    }

    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--danger); }

    .inline-input {
      min-width: 140px;
    }

    @media (max-width: 1100px) {
      .grid4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 860px) {
      .wrap { padding: 10px; }
      .grid,
      .grid4 { grid-template-columns: 1fr; }
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }
      .hero h1 { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <h1>Операционная админ панель</h1>
        <p>Лиды, контрагенты, номенклатура и справочники в табличном формате для ежедневной работы менеджеров.</p>
      </div>
      <div class="badge">Петрохлеб-Кубань · B2B</div>
    </section>

    <section class="card" id="login-card">
      <h2 style="margin:0 0 8px">Вход</h2>
      <div class="grid">
        <input id="login" value="admin" placeholder="Логин" />
        <input id="password" type="password" placeholder="Пароль" />
      </div>
      <div class="row">
        <button id="login-btn">Войти</button>
        <span class="muted">Требуется токен администратора</span>
      </div>
      <div id="login-msg" class="msg"></div>
    </section>

    <section id="panel" class="hidden">
      <div class="card">
        <h2 style="margin:0 0 8px">Рабочие разделы</h2>
        <div class="tabs" id="tabs"></div>
      </div>

      <section id="tab-dashboard" class="card tab-pane"></section>
      <section id="tab-leads" class="card tab-pane hidden"></section>
      <section id="tab-pipeline" class="card tab-pane hidden"></section>
      <section id="tab-counterparties" class="card tab-pane hidden"></section>
      <section id="tab-nomenclature" class="card tab-pane hidden"></section>
      <section id="tab-quality" class="card tab-pane hidden"></section>
      <section id="tab-price-policies" class="card tab-pane hidden"></section>
      <section id="tab-lots" class="card tab-pane hidden"></section>
      <section id="tab-regions" class="card tab-pane hidden"></section>
      <section id="tab-transport" class="card tab-pane hidden"></section>
      <section id="tab-delivery-basis" class="card tab-pane hidden"></section>
      <section id="tab-knowledge" class="card tab-pane hidden"></section>
      <section id="tab-chat-sessions" class="card tab-pane hidden"></section>
      <section id="tab-tasks" class="card tab-pane hidden"></section>
      <section id="tab-users" class="card tab-pane hidden"></section>
      <section id="tab-settings" class="card tab-pane hidden"></section>
    </section>
  </div>

  <script>
    const tabs = [
      ["dashboard", "Сводка"],
      ["leads", "Лиды"],
      ["pipeline", "Воронка"],
      ["counterparties", "Контрагенты"],
      ["nomenclature", "Номенклатура"],
      ["quality", "Шаблоны качества"],
      ["price-policies", "Ценовые политики"],
      ["lots", "Лоты и наличие"],
      ["regions", "Регионы и порты"],
      ["transport", "Транспорт"],
      ["delivery-basis", "Базисы"],
      ["knowledge", "База знаний"],
      ["chat-sessions", "Чат-сессии"],
      ["tasks", "Задачи"],
      ["users", "Пользователи"],
      ["settings", "Настройки"],
    ]

    const statusLabels = {
      draft: "Черновик",
      partially_qualified: "Частично квалифицирован",
      qualified: "Квалифицирован",
      handed_to_manager: "Передан менеджеру",
      closed: "Закрыт",
      blocked: "Заблокирован",
    }

    const state = {
      stats: {},
      leads: [],
      pipeline: [],
      counterparties: [],
      commodities: [],
      qualityTemplates: [],
      pricePolicies: [],
      lots: [],
      regions: [],
      transportModes: [],
      deliveryBasis: [],
      knowledge: [],
      sessions: [],
      tasks: [],
      users: [],
      settings: [],
    }

    let token = ""

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;")
    }

    function fmt(value) {
      if (value === null || value === undefined) return ""
      return String(value)
    }

    function toBool(value) {
      if (typeof value === "boolean") return value
      return ["1", "true", "yes", "on"].includes(String(value).toLowerCase())
    }

    async function api(url, opts = {}) {
      const headers = { ...(opts.headers || {}) }
      const hasBody = opts.body !== undefined
      if (hasBody) headers["Content-Type"] = "application/json"
      if (token) headers["x-admin-token"] = token

      const response = await fetch(url, { ...opts, headers })
      const text = await response.text()
      let data = {}
      try { data = text ? JSON.parse(text) : {} } catch {}
      if (!response.ok) throw new Error(data.detail || text || `HTTP ${response.status}`)
      return data
    }

    function activateTab(name) {
      document.querySelectorAll(".tab-pane").forEach(node => node.classList.add("hidden"))
      document.querySelectorAll(".tab").forEach(node => node.classList.remove("active"))
      document.getElementById(`tab-${name}`).classList.remove("hidden")
      document.querySelector(`.tab[data-name='${name}']`)?.classList.add("active")
    }

    function renderTabs() {
      const wrap = document.getElementById("tabs")
      wrap.innerHTML = ""
      tabs.forEach(([code, title]) => {
        const btn = document.createElement("button")
        btn.className = "tab"
        btn.dataset.name = code
        btn.textContent = title
        btn.onclick = () => activateTab(code)
        wrap.appendChild(btn)
      })
      activateTab("dashboard")
    }

    function renderDashboard() {
      const stats = state.stats || {}
      const byRequestRows = Object.entries(stats.by_request_type || {}).map(([k, v]) => `<tr><td>${escapeHtml(k)}</td><td>${escapeHtml(v)}</td></tr>`).join("")
      const byStageRows = Object.entries(stats.by_stage || {}).map(([k, v]) => `<tr><td>${escapeHtml(statusLabels[k] || k)}</td><td>${escapeHtml(v)}</td></tr>`).join("")

      document.getElementById("tab-dashboard").innerHTML = `
        <h3 style="margin:0 0 8px">Сводка</h3>
        <div class="grid4">
          <div class="kpi"><div class="title">Лиды всего</div><div class="value">${stats.leads_total || 0}</div></div>
          <div class="kpi"><div class="title">Горячие лиды</div><div class="value">${stats.hot_leads || 0}</div></div>
          <div class="kpi"><div class="title">Неназначенные</div><div class="value">${stats.unassigned_leads || 0}</div></div>
          <div class="kpi"><div class="title">Открытые задачи</div><div class="value">${stats.tasks_open || 0}</div></div>
        </div>
        <div class="grid" style="margin-top:10px">
          <div>
            <div class="pill">Типы запросов</div>
            <div class="table-wrap"><table><thead><tr><th>Тип</th><th>Кол-во</th></tr></thead><tbody>${byRequestRows || "<tr><td colspan='2'>Нет данных</td></tr>"}</tbody></table></div>
          </div>
          <div>
            <div class="pill">Статусы лидов</div>
            <div class="table-wrap"><table><thead><tr><th>Статус</th><th>Кол-во</th></tr></thead><tbody>${byStageRows || "<tr><td colspan='2'>Нет данных</td></tr>"}</tbody></table></div>
          </div>
        </div>
      `
    }

    function buildLeadRowsForExport(rows) {
      return rows.map(row => {
        const contact = row.contact_snapshot || {}
        const item = row.lead_item || {}
        return {
          id: row.id || "",
          тип: row.request_type_code || "",
          статус: statusLabels[row.status_code] || row.status_code || "",
          приоритет: row.priority_code || "",
          компания: contact.company_name || "",
          контакт: contact.contact_name || "",
          телефон: contact.phone || "",
          email: contact.email || "",
          telegram: contact.telegram || "",
          товар_id: item.commodity_id || "",
          объем: item.volume_value || "",
          ед_изм: item.volume_unit || "",
          сводка: row.summary || "",
          комментарий: row.manager_comment || "",
          обновлено: row.updated_at || "",
        }
      })
    }

    function downloadBlob(filename, mimeType, content) {
      const blob = new Blob([content], { type: mimeType })
      const url = URL.createObjectURL(blob)
      const link = document.createElement("a")
      link.href = url
      link.download = filename
      document.body.appendChild(link)
      link.click()
      link.remove()
      URL.revokeObjectURL(url)
    }

    function exportLeadsCsv() {
      const rows = buildLeadRowsForExport(state.leads)
      if (!rows.length) return
      const headers = Object.keys(rows[0])
      const lines = [headers.join(";")]
      for (const row of rows) {
        lines.push(headers.map(h => `"${String(row[h] ?? "").replaceAll('"', '""')}"`).join(";"))
      }
      downloadBlob(`leads_${new Date().toISOString().slice(0, 10)}.csv`, "text/csv;charset=utf-8", lines.join("\n"))
    }

    function exportLeadsExcel() {
      const rows = buildLeadRowsForExport(state.leads)
      if (!rows.length) return
      const headers = Object.keys(rows[0])
      const table = `
        <table border="1">
          <thead><tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join("")}</tr></thead>
          <tbody>
            ${rows.map(r => `<tr>${headers.map(h => `<td>${escapeHtml(r[h])}</td>`).join("")}</tr>`).join("")}
          </tbody>
        </table>
      `
      const html = `
        <html><head><meta charset="UTF-8" /></head><body>${table}</body></html>
      `
      downloadBlob(`leads_${new Date().toISOString().slice(0, 10)}.xls`, "application/vnd.ms-excel;charset=utf-8", html)
    }

    function exportLeadsPdf() {
      const rows = buildLeadRowsForExport(state.leads)
      if (!rows.length) return
      const headers = Object.keys(rows[0])
      const html = `
        <!doctype html>
        <html lang="ru">
        <head>
          <meta charset="UTF-8" />
          <title>Экспорт лидов</title>
          <style>
            body { font-family: Arial, sans-serif; color: #111; }
            h1 { font-size: 20px; margin-bottom: 8px; }
            table { width: 100%; border-collapse: collapse; font-size: 11px; }
            th, td { border: 1px solid #bbb; padding: 4px; text-align: left; vertical-align: top; }
            th { background: #f3f3f3; }
          </style>
        </head>
        <body>
          <h1>Лиды — ${new Date().toLocaleString("ru-RU")}</h1>
          <table>
            <thead><tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join("")}</tr></thead>
            <tbody>${rows.map(r => `<tr>${headers.map(h => `<td>${escapeHtml(r[h])}</td>`).join("")}</tr>`).join("")}</tbody>
          </table>
        </body>
        </html>
      `
      const win = window.open("", "_blank", "width=1200,height=800")
      if (!win) return
      win.document.open()
      win.document.write(html)
      win.document.close()
      win.focus()
      setTimeout(() => win.print(), 250)
    }

    function renderLeads() {
      const rows = state.leads || []
      const body = rows.map(row => {
        const contact = row.contact_snapshot || {}
        const item = row.lead_item || {}
        return `
          <tr>
            <td>${escapeHtml(row.id)}</td>
            <td>${escapeHtml(row.request_type_code || "")}</td>
            <td>
              <select data-lead-status="${row.id}">
                ${["draft", "partially_qualified", "qualified", "handed_to_manager", "closed", "blocked"].map(code =>
                  `<option value="${code}" ${row.status_code === code ? "selected" : ""}>${escapeHtml(statusLabels[code] || code)}</option>`
                ).join("")}
              </select>
            </td>
            <td>${escapeHtml(row.priority_code || "")}</td>
            <td>${escapeHtml(contact.company_name || "")}</td>
            <td>${escapeHtml(contact.contact_name || "")}</td>
            <td>${escapeHtml(contact.phone || contact.email || contact.telegram || "")}</td>
            <td>${escapeHtml(item.commodity_id || "")}</td>
            <td>${escapeHtml(item.volume_value || "")} ${escapeHtml(item.volume_unit || "")}</td>
            <td>${escapeHtml(row.summary || "")}</td>
            <td>
              <textarea data-lead-comment="${row.id}" style="min-height:60px">${escapeHtml(row.manager_comment || "")}</textarea>
              <div class="row"><button data-lead-save="${row.id}">Сохранить</button></div>
            </td>
          </tr>
        `
      }).join("")

      document.getElementById("tab-leads").innerHTML = `
        <h3 style="margin:0 0 8px">Лиды</h3>
        <div class="row">
          <button id="reload-leads" class="ghost">Обновить</button>
          <select id="lead-export-format" class="inline-input">
            <option value="csv">Экспорт CSV</option>
            <option value="excel">Экспорт Excel</option>
            <option value="pdf">Экспорт PDF</option>
          </select>
          <button id="lead-export-btn" class="warn">Выгрузить</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th><th>Тип</th><th>Статус</th><th>Приоритет</th><th>Компания</th><th>Контакт</th><th>Связь</th><th>Товар ID</th><th>Объем</th><th>Сводка</th><th>Комментарий менеджера</th>
              </tr>
            </thead>
            <tbody>${body || "<tr><td colspan='11'>Нет данных</td></tr>"}</tbody>
          </table>
        </div>
      `

      document.getElementById("reload-leads").onclick = loadAll
      document.getElementById("lead-export-btn").onclick = () => {
        const format = document.getElementById("lead-export-format").value
        if (format === "csv") exportLeadsCsv()
        else if (format === "excel") exportLeadsExcel()
        else exportLeadsPdf()
      }

      document.querySelectorAll("button[data-lead-save]").forEach(btn => {
        btn.onclick = async () => {
          const id = Number(btn.dataset.leadSave)
          const status = document.querySelector(`select[data-lead-status='${id}']`)?.value || "draft"
          const managerComment = document.querySelector(`textarea[data-lead-comment='${id}']`)?.value || ""
          await api(`/api/v1/leads/${id}`, {
            method: "PUT",
            body: JSON.stringify({ status_code: status, manager_comment: managerComment }),
          })
          await loadAll()
        }
      })
    }

    function renderPipeline() {
      const rows = (state.pipeline || []).map(item => `<tr><td>${escapeHtml(item.code)}</td><td>${escapeHtml(item.name)}</td><td>${escapeHtml(item.count)}</td></tr>`).join("")
      document.getElementById("tab-pipeline").innerHTML = `
        <h3 style="margin:0 0 8px">Воронка</h3>
        <div class="table-wrap">
          <table><thead><tr><th>Код</th><th>Этап</th><th>Кол-во</th></tr></thead><tbody>${rows || "<tr><td colspan='3'>Нет данных</td></tr>"}</tbody></table>
        </div>
      `
    }

    function buildInput(tabId, rowId, field) {
      const value = rowId === "new" ? (field.defaultValue ?? "") : (field.getValue ? field.getValue(rowId) : "")
      const safeValue = escapeHtml(value)
      const attrs = `data-tab='${tabId}' data-row='${rowId}' data-field='${field.key}'`

      if (field.type === "boolean") {
        return `<input type='checkbox' ${attrs} ${toBool(value) ? "checked" : ""} />`
      }
      if (field.options) {
        return `<select ${attrs}>${field.options.map(opt => `<option value='${escapeHtml(opt.value)}' ${String(value) === String(opt.value) ? "selected" : ""}>${escapeHtml(opt.label)}</option>`).join("")}</select>`
      }
      if (field.type === "textarea") {
        return `<textarea ${attrs}>${safeValue}</textarea>`
      }
      const inputType = field.type === "number" ? "number" : "text"
      return `<input type='${inputType}' value='${safeValue}' ${attrs} />`
    }

    function readFieldValue(tabId, rowId, field) {
      const selector = `[data-tab='${tabId}'][data-row='${rowId}'][data-field='${field.key}']`
      const el = document.querySelector(selector)
      if (!el) return undefined
      if (field.type === "boolean") return !!el.checked
      if (field.type === "number") {
        const raw = String(el.value || "").trim()
        return raw ? Number(raw) : null
      }
      return String(el.value || "").trim()
    }

    function renderCrudTab(tabId, title, rows, cfg) {
      const rowHtml = rows.map(row => {
        const rowId = row.id
        const cells = cfg.columns.map(field => {
          const valueGetter = () => row[field.key]
          const fieldCtx = { ...field, getValue: valueGetter }
          const content = field.readonly ? escapeHtml(valueGetter()) : buildInput(tabId, rowId, fieldCtx)
          return `<td>${content}</td>`
        }).join("")

        return `<tr>${cells}<td><button data-save-row='${tabId}:${rowId}'>Сохранить</button></td></tr>`
      }).join("")

      const createCells = (cfg.create || []).map(field => `<td>${buildInput(tabId, "new", field)}</td>`).join("")
      const createFillers = new Array(Math.max(0, cfg.columns.length - (cfg.create || []).length)).fill("<td></td>").join("")

      document.getElementById(`tab-${tabId}`).innerHTML = `
        <h3 style="margin:0 0 8px">${escapeHtml(title)}</h3>
        <div class="row">
          <button id='reload-${tabId}' class='ghost'>Обновить</button>
          ${cfg.create ? `<button id='create-${tabId}'>Добавить запись</button>` : ""}
        </div>
        <div id='msg-${tabId}' class='msg'></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                ${cfg.columns.map(field => `<th>${escapeHtml(field.label)}</th>`).join("")}
                <th>Действие</th>
              </tr>
            </thead>
            <tbody>
              ${cfg.create ? `<tr>${createCells}${createFillers}<td><button data-create='${tabId}'>Создать</button></td></tr>` : ""}
              ${rowHtml || `<tr><td colspan='${cfg.columns.length + 1}'>Нет данных</td></tr>`}
            </tbody>
          </table>
        </div>
      `

      document.getElementById(`reload-${tabId}`).onclick = loadAll

      document.querySelectorAll(`button[data-save-row^='${tabId}:']`).forEach(btn => {
        btn.onclick = async () => {
          const id = Number(btn.dataset.saveRow.split(":")[1])
          const payload = {}
          for (const field of cfg.columns.filter(col => !col.readonly && !col.locked)) {
            const value = readFieldValue(tabId, id, field)
            if (value !== undefined) payload[field.key] = value
          }

          try {
            await api(`${cfg.endpoint}/${id}`, { method: "PUT", body: JSON.stringify(payload) })
            const msg = document.getElementById(`msg-${tabId}`)
            msg.className = "msg ok"
            msg.textContent = "Изменения сохранены"
            await loadAll()
          } catch (error) {
            const msg = document.getElementById(`msg-${tabId}`)
            msg.className = "msg err"
            msg.textContent = `Ошибка сохранения: ${error.message || error}`
          }
        }
      })

      if (cfg.create) {
        document.querySelector(`button[data-create='${tabId}']`).onclick = async () => {
          const payload = { ...(cfg.createDefaults || {}) }
          for (const field of cfg.create) {
            payload[field.key] = readFieldValue(tabId, "new", field)
          }

          try {
            await api(cfg.endpoint, { method: "POST", body: JSON.stringify(payload) })
            const msg = document.getElementById(`msg-${tabId}`)
            msg.className = "msg ok"
            msg.textContent = "Запись создана"
            await loadAll()
          } catch (error) {
            const msg = document.getElementById(`msg-${tabId}`)
            msg.className = "msg err"
            msg.textContent = `Ошибка создания: ${error.message || error}`
          }
        }
      }
    }

    function renderChatSessions() {

      document.getElementById("tab-chat-sessions").innerHTML = `
        <h3 style="margin:0 0 8px">Чат-сессии</h3>
        <div class="row"><button id='reload-sessions' class='ghost'>Обновить</button></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Состояние</th><th>Тип запроса</th><th>Лид</th><th>Обновлено</th><th>Детали</th></tr></thead>
            <tbody>${body || "<tr><td colspan='6'>Нет данных</td></tr>"}</tbody>
          </table>
        </div>
        <div id='chat-session-detail' style='margin-top:10px' class='muted'>Выберите сессию для просмотра деталей</div>
      `

      document.getElementById("reload-sessions").onclick = loadAll
      document.querySelectorAll("button[data-open-session]").forEach(btn => {
        btn.onclick = async () => {
          const id = Number(btn.dataset.openSession)
          const detail = await api(`/api/v1/admin/chat-sessions/${id}`)

          const messages = (detail.messages || []).map(msg =>
            `<tr><td>${escapeHtml(msg.created_at || "")}</td><td>${escapeHtml(msg.direction || "")}</td><td>${escapeHtml(msg.text || "")}</td></tr>`
          ).join("")

          const facts = (detail.facts || []).map(fact =>
            `<tr><td>${escapeHtml(fact.fact_key || "")}</td><td>${escapeHtml(fact.fact_value_text || "")}</td><td>${escapeHtml(fact.confidence || "")}</td></tr>`
          ).join("")

          const missing = (detail.missing_fields || []).map(item =>
            `<tr><td>${escapeHtml(item.field_code || "")}</td><td>${item.is_collected ? "Да" : "Нет"}</td><td>${escapeHtml(item.priority_order || "")}</td></tr>`
          ).join("")

          const checkpoints = (detail.checkpoints || []).map(cp =>
            `<tr><td>${escapeHtml(cp.created_at || "")}</td><td>${escapeHtml(cp.checkpoint_code || "")}</td><td>${escapeHtml(cp.checkpoint_status || "")}</td><td>${escapeHtml(cp.note || "")}</td></tr>`
          ).join("")

          document.getElementById("chat-session-detail").innerHTML = `
            <div class='pill'>Сессия ${escapeHtml(detail.session?.id || id)} · Лид ${escapeHtml(detail.lead?.id || "—")}</div>

            <h4>Сообщения</h4>
            <div class='table-wrap'><table><thead><tr><th>Время</th><th>Сторона</th><th>Текст</th></tr></thead><tbody>${messages || "<tr><td colspan='3'>Нет сообщений</td></tr>"}</tbody></table></div>

            <h4>Извлеченные факты</h4>
            <div class='table-wrap'><table><thead><tr><th>Поле</th><th>Значение</th><th>Уверенность</th></tr></thead><tbody>${facts || "<tr><td colspan='3'>Нет фактов</td></tr>"}</tbody></table></div>

            <h4>Недостающие поля</h4>
            <div class='table-wrap'><table><thead><tr><th>Поле</th><th>Собрано</th><th>Приоритет</th></tr></thead><tbody>${missing || "<tr><td colspan='3'>Нет данных</td></tr>"}</tbody></table></div>

            <h4>Контрольные точки</h4>
            <div class='table-wrap'><table><thead><tr><th>Время</th><th>Код</th><th>Статус</th><th>Комментарий</th></tr></thead><tbody>${checkpoints || "<tr><td colspan='4'>Нет данных</td></tr>"}</tbody></table></div>
          `
        }
      })
    }

    async function loadAll() {
      const [stats, leads, pipelineResp, counterparties, commodities, qualityTemplates, pricePolicies, lots, regions, transportModes, deliveryBasis, knowledge, sessions, tasks, users, settings] = await Promise.all([
        api("/api/v1/admin/stats"),
        api("/api/v1/leads"),
        api("/api/v1/admin/pipeline"),
        api("/api/v1/admin/counterparties"),
        api("/api/v1/catalog/commodities"),
        api("/api/v1/catalog/quality-templates"),
        api("/api/v1/catalog/price-policies"),
        api("/api/v1/catalog/lots"),
        api("/api/v1/catalog/regions"),
        api("/api/v1/catalog/transport-modes"),
        api("/api/v1/catalog/delivery-basis"),
        api("/api/v1/admin/knowledge"),
        api("/api/v1/admin/chat-sessions"),
        api("/api/v1/admin/tasks"),
        api("/api/v1/admin/users"),
        api("/api/v1/admin/settings"),
      ])

      state.stats = stats || {}
      state.leads = leads || []
      state.pipeline = pipelineResp?.items || []
      state.counterparties = counterparties || []
      state.commodities = commodities || []
      state.qualityTemplates = qualityTemplates || []
      state.pricePolicies = pricePolicies || []
      state.lots = lots || []
      state.regions = regions || []
      state.transportModes = transportModes || []
      state.deliveryBasis = deliveryBasis || []
      state.knowledge = knowledge || []
      state.sessions = sessions || []
      state.tasks = tasks || []
      state.users = users || []
      state.settings = settings || []

      renderDashboard()
      renderLeads()
      renderPipeline()
      renderAllCrudTabs()
    }

    document.getElementById("login-btn").onclick = async () => {
      const msg = document.getElementById("login-msg")
      msg.textContent = ""
      try {
        const payload = await api("/api/v1/admin/login", {
          method: "POST",
          body: JSON.stringify({
            username: document.getElementById("login").value,
            password: document.getElementById("password").value,
          }),
        })

        token = payload.token
        localStorage.setItem("agrolead_admin_token", token)

        document.getElementById("login-card").classList.add("hidden")
        document.getElementById("panel").classList.remove("hidden")
        renderTabs()
        await loadAll()
      } catch (error) {
        msg.className = "msg err"
        msg.textContent = `Ошибка входа: ${error.message || error}`
      }
    }

    ;(async () => {
      const saved = localStorage.getItem("agrolead_admin_token")
      if (!saved) return
      token = saved
      try {
        await api("/api/v1/admin/stats")
        document.getElementById("login-card").classList.add("hidden")
        document.getElementById("panel").classList.remove("hidden")
        renderTabs()
        await loadAll()
      } catch {
        token = ""
        localStorage.removeItem("agrolead_admin_token")
      }
    })()
